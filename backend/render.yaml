services:
  - type: web
    name: ludofeed-backend
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CACHE_EXPIRY_DAYS
        value: 30
      - key: FEED_CHECK_INTERVAL_MINUTES
        value: 30